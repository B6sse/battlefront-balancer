name: Backend CI + Docker Build

on:
  push:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: gradle

      - name: Backend ktlint + tests + coverage
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          ./gradlew :backend:ktlintCheck
          ./gradlew :backend:test
          ./gradlew :backend:koverXmlReport

      - name: Build backend Docker image (no push)
        env:
          IMAGE_TAG: backend-${{ github.sha }}
        run: |
          docker build -f backend/Dockerfile -t battlefront-balancer-backend:${IMAGE_TAG} .

