spring:
  application:
    name: battlefront-balancer
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      timeout: ${SESSION_TIMEOUT:30m}
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: strict

# Rate limit for login
app:
  rate-limit:
    login:
      enabled: ${RATE_LIMIT_LOGIN_ENABLED:true}
      max-per-minute: ${RATE_LIMIT_LOGIN_PER_MINUTE:5}