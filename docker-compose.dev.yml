# this is the Postgres DB for local development
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: battlefront
      POSTGRES_PASSWORD: battlefront
      POSTGRES_DB: battlefront_balancer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U battlefront -d battlefront_balancer"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_dev:
